<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>/* %%COMMON_CSS%% */</style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <span class="event-badge badge-fork">🍴 Fork</span>
      <span class="repo-name">{{repoFullName}}</span>
    </div>

    <div class="card-title">{{forkFullName}}</div>

    <div class="author">
      <img class="avatar" src="{{avatarUrl}}" alt="avatar">
      <span>
        <span class="author-name">{{senderName}}</span>
        <span class="author-action"> 创建了 Fork</span>
      </span>
      <span class="timestamp">{{timestamp}}</span>
    </div>

    <div class="description">
      从 {{repoFullName}} fork 到 {{forkFullName}}
    </div>

    <div class="card-footer">
      <span>🍴 {{forksCount}} forks · ⭐ {{starsCount}} stars</span>
      <span class="watermark">GitHub QQ Push</span>
    </div>
  </div>
</body>
</html>
