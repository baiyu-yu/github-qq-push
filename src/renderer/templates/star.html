<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>/* %%COMMON_CSS%% */</style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <span class="event-badge badge-star">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="display: inline-block; vertical-align: text-bottom;">
          <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path>
        </svg>
        Star
      </span>
      <span class="repo-name">{{repoFullName}}</span>
    </div>

    <div class="card-title">{{repoFullName}}</div>

    <div class="description">{{repoDescription}}</div>

    <div class="author">
      <img class="avatar" src="{{avatarUrl}}" alt="avatar">
      <span>
        <span class="author-name">{{senderName}}</span>
        <span class="author-action"> {{actionText}}</span>
      </span>
      <span class="timestamp">{{timestamp}}</span>
    </div>

    <div class="star-count">
      <svg width="28" height="28" viewBox="0 0 16 16" fill="currentColor" class="star-icon">
        <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path>
      </svg>
      <span>{{starCount}}</span>
      <span style="font-size: 14px; color: #8b949e; font-weight: 400;"> stars</span>
    </div>

    <div class="card-footer">
      <span>{{language}} · {{forksCount}} forks</span>
      <span class="watermark">GitHub QQ Push</span>
    </div>
  </div>
</body>
</html>
